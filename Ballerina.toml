[package]
org = "tharmigan"
name = "persist_connection_demo"
version = "0.1.0"
distribution = "2201.13.1"
title = "Persist Connection Demo"

[build-options]
sticky = true

[[dependency]]
org = "ballerina"
name = "tool.persist"
version = "1.9.0"

[[dependency]]
org = "ballerinax"
name = "persist.sql"
version = "1.7.2"
repository = "local"

[[tool.persist]]
id = "persist_connection_demo.publishingDB"
targetModule = "persist_connection_demo.publishingDB"
filePath = "persist/publishingDB/model.bal"
options.datastore = "postgresql"
# options.eagerLoading = true
options.withInitParams = true

[[tool.persist]]
id = "persist_connection_demo.contentDB"
targetModule = "persist_connection_demo.contentDB"
filePath = "persist/contentDB/model.bal"
options.datastore = "mysql"
options.eagerLoading = true
options.withInitParams = true

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "persist.sql-native"
version = "1.7.2-SNAPSHOT"
path = "/Users/tharmigan/.m2/repository/io/ballerina/stdlib/persist.sql-native/1.7.2-SNAPSHOT/persist.sql-native-1.7.2-SNAPSHOT.jar"

